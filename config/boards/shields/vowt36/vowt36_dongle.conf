CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_EXT_POWER=y

# ---------- Display ----------
CONFIG_SPI=y
CONFIG_MIPI_DBI=y

# SSD1681 / SSD16XX family driver
CONFIG_SSD16XX=y

# ZMK display subsystem
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n

# ePaper is 1-bit (black/white) monochrome
CONFIG_LVGL_BITS_PER_PIXEL=1
CONFIG_LV_COLOR_DEPTH_1=y

# Give the display thread enough stack and memory
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_LV_Z_MEM_POOL_SIZE=4096

# Default font (small, fits 200x200 easily)
CONFIG_LV_FONT_MONTSERRAT_16=y
